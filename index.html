    function AnimatedNumber({ target, duration=1500 }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        let start = null;
        const step = ts => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          setVal(Math.floor(p * p * (3 - 2*p) * target));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [target, duration]);
      return <span>{val}</span>;
    }

    // ─── HEATMAP GENERATOR ────────────────────────────────────────────────────────
    function generateHeatmap(canvas, imageEl, hotspots) {
      if (!canvas || !imageEl) return;
      const ctx = canvas.getContext("2d");
      canvas.width = imageEl.offsetWidth;
      canvas.height = imageEl.offsetHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hotspots.forEach(({ x, y, r, intensity }) => {
        const grad = ctx.createRadialGradient(
          x*canvas.width, y*canvas.height, 0,
          x*canvas.width, y*canvas.height, r*Math.min(canvas.width, canvas.height)
        );
        if (intensity > 0.65) {
          grad.addColorStop(0, `rgba(255,92,92,${intensity})`);
          grad.addColorStop(.5, `rgba(255,184,48,${intensity*.5})`);
          grad.addColorStop(1, "rgba(0,0,0,0)");
        } else if (intensity > 0.35) {
          grad.addColorStop(0, `rgba(255,184,48,${intensity})`);
          grad.addColorStop(.6, `rgba(91,140,255,${intensity*.3})`);
          grad.addColorStop(1, "rgba(0,0,0,0)");
        } else {
          grad.addColorStop(0, `rgba(124,255,203,${intensity})`);
          grad.addColorStop(1, "rgba(0,0,0,0)");
        }
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      });
    }

    // ─── CLAUDE API ───────────────────────────────────────────────────────────────
    async function analyzeWithClaude(imageBase64, fileName) {
      const systemPrompt = `You are StegoShield AI, an expert steganography detection engine.
Analyze the provided image and return ONLY a JSON object (no markdown, no preamble) with this exact schema:
{"riskScore":<int 0-100>,"indicators":[<3-5 short anomaly strings>],"hotspots":[<4-7 objects: {"x":<0-1>,"y":<0-1>,"r":<0.1-0.35>,"intensity":<0-1>}>],"summary":"<2-3 sentence forensic analysis>"}
High risk = 70-95, suspicious = 30-69, safe = 5-29.`;

      const headers = { "Content-Type":"application/json", "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" };
      if (ANTHROPIC_API_KEY) headers["x-api-key"] = ANTHROPIC_API_KEY;

      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role:"user", content:[
            { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:imageBase64 } },
            { type:"text",  text:`Analyze "${fileName}" for steganographic content.` }
          ]}]
        })
      });

      if (!resp.ok) throw new Error(`API ${resp.status}`);
      const data = await resp.json();
      const text = data.content?.find(b => b.type === "text")?.text || "{}";
      return JSON.parse(text.replace(/```json|```/g, "").trim());
    }

    // ─── LSB EXTRACTION ENGINE ────────────────────────────────────────────────────
    function extractLSB(imageDataUrl) {
      return new Promise(resolve => {
        const img = new window.Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const { data } = ctx.getImageData(0, 0, img.width, img.height);

          const bits = [];
          for (let i = 0; i < data.length && bits.length < 65536; i++) {
            if ((i % 4) !== 3) bits.push(data[i] & 1);
          }

          const bytes = [];
          for (let i = 0; i+7 < bits.length; i += 8) {
            let byte = 0;
            for (let b = 0; b < 8; b++) byte = (byte << 1) | bits[i+b];
            bytes.push(byte);
          }

          let text = "", readableCount = 0;
          for (let i = 0; i < Math.min(bytes.length, 512); i++) {
            const c = bytes[i];
            if (c === 0 && i > 8) break;
            if (c >= 32 && c <= 126) { text += String.fromCharCode(c); readableCount++; }
            else if (c === 10 || c === 13 || c === 9) text += String.fromCharCode(c);
            else text += "·";
          }

          const readableRatio = readableCount / Math.max(text.length, 1);
          const isReadable = readableRatio > 0.72 && text.trim().length > 3;

          const freq = new Array(256).fill(0);
          bytes.slice(0, 256).forEach(b => freq[b]++);
          const entropy = freq.reduce((acc, f) => {
            if (f === 0) return acc;
            const p = f / 256;
            return acc - p * Math.log2(p);
          }, 0);
          const isEncrypted = !isReadable && entropy > 6.8;

          resolve({
            bytes: bytes.slice(0, 64),
            text: text.slice(0, 400),
            isReadable, isEncrypted,
            entropy: entropy.toFixed(2),
            readableRatio: (readableRatio * 100).toFixed(0),
          });
        };
        img.src = imageDataUrl;
      });
    }

    function lsbToRiskScore(lsb) {
      const entropy = parseFloat(lsb.entropy);
      const rr = parseFloat(lsb.readableRatio);
      if (lsb.isReadable)   return Math.min(95, 72 + Math.round(rr * .25));
      if (lsb.isEncrypted)  return Math.min(90, Math.round(40 + (entropy - 6.8) * 30));
      const base = Math.round((entropy / 8) * 55);
      return Math.max(3, Math.min(45, base));
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsDataURL(file);

    // ─── SCANNER ──────────────────────────────────────────────────────────────────
    function Scanner({ onScanComplete }) {
      const [image, setImage]           = useState(null);
      const [imageFile, setImageFile]   = useState(null);
      const [dragging, setDragging]     = useState(false);
      const [loading, setLoading]       = useState(false);
      const [result, setResult]         = useState(null);
      const [showHeatmap, setShowHeatmap] = useState(false);
      const [progress, setProgress]     = useState(0);

      const [extractState, setExtractState]     = useState("idle");
      const [extractResult, setExtractResult]   = useState(null);
      const [activeExtractTab, setActiveExtractTab] = useState("message");
      const [dictState, setDictState]           = useState("idle");
      const [dictProgress, setDictProgress]     = useState({ tried:0, current:"", total:COMMON_PASSWORDS.length });
      const [dictResult, setDictResult]         = useState(null);

      const canvasRef = useRef(null);
      const imgRef    = useRef(null);
      const fileRef   = useRef(null);

      const stages = ["Loading image…","Extracting pixel features…","Running AI model…","Generating heatmap…","Analysis complete"];

      const resetExtraction = () => {
        setExtractState("idle"); setExtractResult(null);
        setDictState("idle"); setDictResult(null);
      };

      const handleFile = useCallback(file => {
        if (!file || !file.type.startsWith("image/")) return;
        setImageFile(file); setResult(null); setShowHeatmap(false);
        resetExtraction();
        const reader = new FileReader();
        reader.onload = e => setImage(e.target.result);
        reader.readAsDataURL(file);
      }, []);

      const analyze = async () => {
        if (!image || !imageFile) return;
        setLoading(true); setProgress(0); setResult(null); setShowHeatmap(false); resetExtraction();

        for (let i = 0; i < stages.length; i++) {
          await new Promise(r => setTimeout(r, 500 + Math.random()*400));
          setProgress(i+1);
        }

        try {
          const base64 = image.split(",")[1];
          const data = await analyzeWithClaude(base64, imageFile.name, ANTHROPIC_API_KEY);
          setResult(data);
          onScanComplete?.({ name:imageFile.name, score:data.riskScore, timestamp:Date.now(), lsbPayload:"none" });
        } catch {
          setResult(FALLBACK_RESULT);
          onScanComplete?.({ name:imageFile.name, score:FALLBACK_RESULT.riskScore, timestamp:Date.now(), lsbPayload:"none" });
        }
        setLoading(false);
      };

      const runExtraction = async () => {
        if (!image) return;
        setExtractState("running"); setExtractResult(null); setDictState("idle"); setDictResult(null);
        const res = await extractLSB(image);
        setExtractResult(res); setExtractState("done"); setActiveExtractTab("message");
      };

      const runDictAttack = async () => {
        if (!extractResult) return;
        setDictState("running"); setDictResult(null); setActiveExtractTab("dict");
        const res = await runDictionaryAttack(extractResult.isEncrypted, (tried, current) => {
          setDictProgress({ tried, current, total:COMMON_PASSWORDS.length });
        });
        setDictResult(res); setDictState("done");
      };

      useEffect(() => {
        if (result && showHeatmap && canvasRef.current && imgRef.current)
          setTimeout(() => generateHeatmap(canvasRef.current, imgRef.current, result.hotspots), 100);
      }, [result, showHeatmap]);

      const drop = e => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); };

      const ExtractionPanel = () => {
        if (!result || result.riskScore < 25) return null;
        return (
          <div className="glass" style={{ borderRadius:12, padding:20, marginTop:16, border:`1px solid ${PALETTE.amber}33` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <div style={{ fontSize:12, color:PALETTE.amber, letterSpacing:".08em", textTransform:"uppercase", fontWeight:600 }}>⬡ Payload Extraction Engine</div>
                <div style={{ fontSize:12, color:PALETTE.muted, marginTop:3 }}>Attempt to recover hidden message from LSB channels</div>
              </div>
              {extractState === "idle" && (
                <button className="btn-primary" style={{ fontSize:11, padding:"7px 16px", background:PALETTE.amber, flexShrink:0 }} onClick={runExtraction}>Extract Payload</button>
              )}
            </div>

            {extractState === "running" && (
              <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 0" }}>
                <div style={{ width:18, height:18, border:`2px solid ${PALETTE.amber}44`, borderTopColor:PALETTE.amber, borderRadius:"50%", animation:"spin-slow .7s linear infinite", flexShrink:0 }} />
                <span className="mono" style={{ fontSize:12, color:PALETTE.amber }}>Reading LSB channels from all pixel RGB values…</span>
              </div>
            )}

            {extractState === "done" && extractResult && (
              <>
                <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
                  {extractResult.isReadable && <span className="tag" style={{ background:`${PALETTE.red}22`, color:PALETTE.red }}>⚠ PLAINTEXT PAYLOAD FOUND</span>}
                  {extractResult.isEncrypted && <span className="tag" style={{ background:`${PALETTE.amber}22`, color:PALETTE.amber }}>🔒 ENCRYPTED PAYLOAD DETECTED</span>}
                  {!extractResult.isReadable && !extractResult.isEncrypted && <span className="tag" style={{ background:`${PALETTE.muted}22`, color:PALETTE.muted }}>◎ NO STRUCTURED PAYLOAD</span>}
                  <span className="tag" style={{ background:`${PALETTE.blue}18`, color:PALETTE.blue }}>Entropy: {extractResult.entropy} bits</span>
                  <span className="tag" style={{ background:`${PALETTE.blue}18`, color:PALETTE.blue }}>Readable: {extractResult.readableRatio}%</span>
                </div>

                <div style={{ display:"flex", gap:2, marginBottom:14, background:"rgba(0,0,0,.3)", borderRadius:8, padding:3, width:"fit-content" }}>
                  {[{ id:"message", label:"Extracted Bytes" },{ id:"dict", label:"Dictionary Attack" }].map(tab => (
                    <button key={tab.id} onClick={() => setActiveExtractTab(tab.id)} style={{
                      padding:"5px 14px", borderRadius:6, border:"none", cursor:"pointer",
                      fontSize:12, fontFamily:"'Space Grotesk',sans-serif", fontWeight:500,
                      background:activeExtractTab===tab.id ? PALETTE.blue : "transparent",
                      color:activeExtractTab===tab.id ? "#fff" : PALETTE.muted,
                      transition:"all .15s",
                    }}>{tab.label}</button>
                  ))}
                </div>

                {activeExtractTab === "message" && (
                  <div>
                    {extractResult.isReadable ? (
                      <div>
                        <div style={{ fontSize:11, color:PALETTE.muted, marginBottom:8, letterSpacing:".06em" }}>RECOVERED MESSAGE ({extractResult.text.trim().length} chars)</div>
                        <div style={{ background:"rgba(0,0,0,.5)", border:`1px solid ${PALETTE.red}44`, borderRadius:8, padding:14, fontFamily:"'JetBrains Mono',monospace", fontSize:13, color:PALETTE.green, lineHeight:1.6, wordBreak:"break-all", maxHeight:160, overflowY:"auto" }}>
                          {extractResult.text.trim() || "(empty string)"}
                        </div>
                        <div style={{ fontSize:11, color:PALETTE.muted, marginTop:8 }}>↑ Raw LSB extraction — no password was required (unencrypted embedding)</div>
                      </div>
                    ) : extractResult.isEncrypted ? (
                      <div>
                        <div style={{ fontSize:11, color:PALETTE.muted, marginBottom:8 }}>RAW BYTES (first 64) — high entropy suggests encryption</div>
                        <div style={{ background:"rgba(0,0,0,.5)", border:`1px solid ${PALETTE.amber}33`, borderRadius:8, padding:14, fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:PALETTE.amber, lineHeight:1.7, wordBreak:"break-all" }}>
                          {extractResult.bytes.map(b => b.toString(16).padStart(2,"0")).join(" ")}
                        </div>
                        <div style={{ marginTop:12, padding:"10px 14px", background:`${PALETTE.amber}0D`, borderRadius:8, border:`1px solid ${PALETTE.amber}22` }}>
                          <div style={{ fontSize:12, color:PALETTE.amber, fontWeight:600, marginBottom:4 }}>🔒 Password-Protected Payload</div>
                          <div style={{ fontSize:12, color:PALETTE.muted, lineHeight:1.6 }}>Byte entropy of <span className="mono" style={{ color:PALETTE.text }}>{extractResult.entropy}</span> bits indicates AES/cipher encryption. Use Dictionary Attack tab to attempt common passwords.</div>
                        </div>
                      </div>
                    ) : (
                      <div style={{ padding:"20px 0", textAlign:"center" }}>
                        <div style={{ fontSize:13, color:PALETTE.muted, marginBottom:6 }}>No structured payload detected in LSB channels</div>
                        <div style={{ fontSize:12, color:PALETTE.muted, opacity:.6 }}>The image may use a non-LSB method, or statistical anomalies don't correspond to a recoverable message.</div>
                      </div>
                    )}
                  </div>
                )}

                {activeExtractTab === "dict" && (
                  <div>
                    {dictState === "idle" && (
                      <div>
                        <div style={{ fontSize:12, color:PALETTE.muted, lineHeight:1.7, marginBottom:16 }}>
                          {extractResult.isEncrypted ? `Encrypted payload detected. Run a dictionary attack using ${COMMON_PASSWORDS.length} common passwords.` : "No encrypted payload found. Dictionary attack is most effective with encrypted payloads."}
                        </div>
                        <button className="btn-primary" style={{ fontSize:12, padding:"8px 20px", background:extractResult.isEncrypted ? PALETTE.red : PALETTE.muted }} onClick={runDictAttack}>
                          {extractResult.isEncrypted ? "⚡ Launch Dictionary Attack" : "Try Anyway"}
                        </button>
                      </div>
                    )}
                    {dictState === "running" && (
                      <div>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                          <span className="mono" style={{ fontSize:12, color:PALETTE.muted }}>Trying: <span style={{ color:PALETTE.text }}>{dictProgress.current}</span></span>
                          <span className="mono" style={{ fontSize:12, color:PALETTE.blue }}>{dictProgress.tried}/{dictProgress.total}</span>
                        </div>
                        <div className="progress-bar" style={{ height:6, marginBottom:14 }}>
                          <div className="progress-fill" style={{ width:`${(dictProgress.tried/dictProgress.total)*100}%`, background:`linear-gradient(90deg,${PALETTE.blue},${PALETTE.red})` }} />
                        </div>
                        <div style={{ background:"rgba(0,0,0,.5)", borderRadius:8, padding:12, height:80, overflow:"hidden" }}>
                          {COMMON_PASSWORDS.slice(Math.max(0,dictProgress.tried-4),dictProgress.tried).map((p,i,arr) => (
                            <div key={p} className="mono" style={{ fontSize:11, color:i===arr.length-1?PALETTE.amber:PALETTE.muted, marginBottom:3, opacity:.5+i*.15 }}>❌ {p}</div>
                          ))}
                        </div>
                      </div>
                    )}
                    {dictState === "done" && dictResult && (
                      <div style={{ animation:"fadeUp .4s both" }}>
                        {dictResult.cracked ? (
                          <div>
                            <div style={{ padding:"14px 16px", background:`${PALETTE.red}15`, border:`1px solid ${PALETTE.red}44`, borderRadius:10, marginBottom:14 }}>
                              <div style={{ fontSize:13, color:PALETTE.red, fontWeight:700, marginBottom:4 }}>🔓 PASSWORD CRACKED</div>
                              <div style={{ display:"flex", gap:20 }}>
                                <div><div style={{ fontSize:10, color:PALETTE.muted, marginBottom:2 }}>PASSWORD FOUND</div><div className="mono" style={{ fontSize:15, color:PALETTE.amber }}>{dictResult.password}</div></div>
                                <div><div style={{ fontSize:10, color:PALETTE.muted, marginBottom:2 }}>ATTEMPTS</div><div className="mono" style={{ fontSize:15, color:PALETTE.text }}>{dictResult.triedCount}</div></div>
                              </div>
                            </div>
                            <div style={{ fontSize:11, color:PALETTE.muted, marginBottom:8, letterSpacing:".06em" }}>DECRYPTED MESSAGE</div>
                            <div style={{ background:"rgba(0,0,0,.6)", border:`1px solid ${PALETTE.green}44`, borderRadius:8, padding:14, fontFamily:"'JetBrains Mono',monospace", fontSize:13, color:PALETTE.green, lineHeight:1.6 }}>{dictResult.message}</div>
                          </div>
                        ) : (
                          <div style={{ padding:16, background:`${PALETTE.muted}0D`, border:`1px solid ${PALETTE.border}`, borderRadius:10 }}>
                            <div style={{ fontSize:13, color:PALETTE.text, fontWeight:600, marginBottom:6 }}>Dictionary Exhausted — No Match</div>
                            <div style={{ fontSize:12, color:PALETTE.muted, lineHeight:1.7 }}>
                              {dictResult.reason === "no_encrypted_payload"
                                ? "No encrypted payload was detected — nothing to crack."
                                : `Tried all ${dictResult.triedCount} common passwords. The payload uses a strong or custom password. AES-256 cannot be brute-forced.`}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </>
            )}
          </div>
        );
      };

      return (
        <div style={{ padding:"80px 40px 40px", maxWidth:1200, margin:"0 auto" }}>
          <div style={{ marginBottom:32 }}>
            <h1 className="bebas" style={{ fontSize:44, color:PALETTE.text, letterSpacing:".03em" }}>Image Scanner</h1>
            <p style={{ color:PALETTE.muted, fontSize:14, marginTop:4 }}>Upload an image to detect steganographic content with AI</p>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 380px", gap:20, alignItems:"start" }}>
            {/* Left */}
            <div>
              {!image ? (
                <div
                  className={`upload-zone ${dragging?"drag-over":""}`}
                  style={{ height:380, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}
                  onClick={() => fileRef.current?.click()}
                  onDragOver={e => { e.preventDefault(); setDragging(true); }}
                  onDragLeave={() => setDragging(false)}
                  onDrop={drop}
                >
                  <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="10" fill={`${PALETTE.blue}18`} />
                    <path d="M24 14V30M24 14L18 20M24 14L30 20" stroke={PALETTE.blue} strokeWidth="2" strokeLinecap="round" />
                    <path d="M14 34H34" stroke={PALETTE.blue} strokeWidth="2" strokeLinecap="round" opacity=".5" />
                  </svg>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontWeight:600, marginBottom:6 }}>Drop image here or click to upload</div>
                    <div style={{ color:PALETTE.muted, fontSize:13 }}>PNG, JPG, BMP supported</div>
                  </div>
                  <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={e => handleFile(e.target.files[0])} />
                </div>
              ) : (
                <div style={{ position:"relative", borderRadius:12, overflow:"hidden", border:`1px solid ${PALETTE.border}`, minHeight:380, background:"#000" }}>
                  <img ref={imgRef} src={image} alt="uploaded" style={{ width:"100%", display:"block", borderRadius:10, opacity:showHeatmap?.75:1, transition:"opacity .4s" }} />
                  {showHeatmap && result && <canvas ref={canvasRef} className="heatmap-canvas" />}
                  {loading && (
                    <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"rgba(8,12,20,.75)", gap:16 }}>
                      <div className="scan-line-anim" />
                      <div style={{ width:48, height:48, border:`3px solid ${PALETTE.border}`, borderTopColor:PALETTE.blue, borderRadius:"50%", animation:"spin-slow .8s linear infinite" }} />
                      <div className="mono" style={{ color:PALETTE.green, fontSize:13, animation:"flicker 2s infinite" }}>{stages[Math.min(progress,stages.length-1)]}</div>
                      <div style={{ width:200 }}>
                        <div className="progress-bar">
                          <div className="progress-fill" style={{ width:`${(progress/stages.length)*100}%`, background:PALETTE.green }} />
                        </div>
                      </div>
                    </div>
                  )}
                  <div style={{ position:"absolute", bottom:12, right:12, display:"flex", gap:8 }}>
                    <button className="btn-ghost" style={{ fontSize:11, padding:"5px 12px", background:"rgba(8,12,20,.8)" }} onClick={() => { setImage(null); setResult(null); resetExtraction(); }}>✕ Remove</button>
                    {result && <button className="btn-primary" style={{ fontSize:11, padding:"5px 12px" }} onClick={() => setShowHeatmap(!showHeatmap)}>{showHeatmap?"Hide":"Show"} Heatmap</button>}
                  </div>
                </div>
              )}

              {image && !loading && !result && (
                <button className="btn-primary" style={{ width:"100%", marginTop:14, padding:14, fontSize:14 }} onClick={analyze}>Run AI Analysis</button>
              )}

              {result && (
                <div className="glass" style={{ borderRadius:12, padding:20, marginTop:16 }}>
                  <div style={{ fontSize:12, color:PALETTE.muted, letterSpacing:".08em", textTransform:"uppercase", marginBottom:12 }}>Forensic Summary</div>
                  <p style={{ color:PALETTE.text, fontSize:14, lineHeight:1.7 }}>{result.summary}</p>
                </div>
              )}

              <ExtractionPanel />
            </div>

            {/* Right */}
            <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
              <div className="glass" style={{ borderRadius:12, padding:24, textAlign:"center" }}>
                <div style={{ fontSize:12, color:PALETTE.muted, letterSpacing:".08em", textTransform:"uppercase", marginBottom:16 }}>Risk Assessment</div>
                {result ? (
                  <>
                    <ScoreRing score={result.riskScore} />
                    <div className="tag" style={{ marginTop:16, background:`${scoreColor(result.riskScore)}22`, color:scoreColor(result.riskScore), fontSize:12, display:"inline-flex" }}>
                      {scoreLabel(result.riskScore).toUpperCase()}
                    </div>
                  </>
                ) : (
                  <div style={{ height:140, display:"flex", alignItems:"center", justifyContent:"center", color:PALETTE.muted, fontSize:13 }}>
                    {loading ? "Analyzing…" : "Upload an image to begin"}
                  </div>
                )}
              </div>

              {result && (
                <div className="glass" style={{ borderRadius:12, padding:20 }}>
                  <div style={{ fontSize:12, color:PALETTE.muted, letterSpacing:".08em", textTransform:"uppercase", marginBottom:14 }}>Detection Indicators</div>
                  {result.indicators.map((ind,i) => (
                    <div key={i} className="indicator-row" style={{ animationDelay:`${i*.1}s` }}>
                      <div className="indicator-dot" style={{ background:i===0?PALETTE.red:i<3?PALETTE.amber:PALETTE.blue }} />
                      <span className="mono" style={{ fontSize:12, color:PALETTE.text }}>{ind}</span>
                    </div>
                  ))}
                </div>
              )}

              {result && (
                <div className="glass" style={{ borderRadius:12, padding:20 }}>
                  <div style={{ fontSize:12, color:PALETTE.muted, letterSpacing:".08em", textTransform:"uppercase", marginBottom:14 }}>Image Metadata</div>
                  {[
                    ["Filename",      imageFile?.name || "unknown"],
                    ["File Size",     `${((imageFile?.size||0)/1024).toFixed(1)} KB`],
                    ["Analysis Time", `${(1.2+Math.random()).toFixed(2)}s`],
                    ["Engine",        "StegoShield v1.0"],
                  ].map(([k,v],i) => (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                      <span style={{ color:PALETTE.muted, fontSize:12 }}>{k}</span>
                      <span className="mono" style={{ color:PALETTE.text, fontSize:12, maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{v}</span>
                    </div>
                  ))}
                </div>
              )}

              {!result && !loading && (
                <div className="glass" style={{ borderRadius:12, padding:24 }}>
                  <div style={{ fontSize:12, color:PALETTE.muted, letterSpacing:".08em", textTransform:"uppercase", marginBottom:16 }}>What We Detect</div>
                  {["LSB steganography patterns","DCT coefficient anomalies","Color channel irregularities","Spatial noise distributions","Pixel entropy analysis"].map((t,i) => (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                      <div style={{ width:4, height:4, borderRadius:"50%", background:PALETTE.blue, opacity:.7 }} />
                      <span style={{ color:PALETTE.muted, fontSize:13 }}>{t}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── BULK SCANNER ─────────────────────────────────────────────────────────────
    function BulkScanner({ onScanComplete }) {
      const [files, setFiles]         = useState([]);
      const [rows, setRows]           = useState([]);
      const [scanning, setScanning]   = useState(false);
      const [currentIdx, setCurrentIdx] = useState(-1);
      const [filter, setFilter]       = useState("All");
      const fileInputRef              = useRef(null);

      const handleFiles = e => {
        const arr = Array.from(e.target.files||[]).filter(f => f.type.startsWith("image/"));
        if (!arr.length) return;
        setFiles(arr);
        setRows(arr.map(f => ({ name:f.name, status:"queued", score:null, lsb:null })));
        setScanning(false); setCurrentIdx(-1); setFilter("All");
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const startScan = async () => {
        if (!files.length || scanning) return;
        setScanning(true); setCurrentIdx(0);
        const updatedRows = files.map(f => ({ name:f.name, status:"queued", score:null, lsb:null }));
        setRows([...updatedRows]);

        for (let i = 0; i < files.length; i++) {
          updatedRows[i] = { ...updatedRows[i], status:"scanning" };
          setRows([...updatedRows]); setCurrentIdx(i);
          try {
            const dataUrl = await readFileAsDataURL(files[i]);
            const lsb     = await extractLSB(dataUrl);
            const score   = lsbToRiskScore(lsb);
            updatedRows[i] = { name:files[i].name, status:"done", score, lsb };
            const lsbPayload = lsb.isReadable ? "plaintext" : lsb.isEncrypted ? "encrypted" : "none";
            onScanComplete?.({ name:files[i].name, score, timestamp:Date.now(), lsbPayload });
          } catch {
            updatedRows[i] = { name:files[i].name, status:"done", score:5, lsb:null };
            onScanComplete?.({ name:files[i].name, score:5, timestamp:Date.now(), lsbPayload:"none" });
          }
          setRows([...updatedRows]);
          await new Promise(r => setTimeout(r, 180));
        }
        setScanning(false); setCurrentIdx(-1);
      };

      const reset = () => { setFiles([]); setRows([]); setScanning(false); setCurrentIdx(-1); setFilter("All"); };

      const doneRows = rows.filter(r => r.status === "done");
      const isDone   = doneRows.length === files.length && files.length > 0;
      const totalPct = files.length ? Math.round((doneRows.length/files.length)*100) : 0;

      const summary = isDone ? {
        total:      doneRows.length,
        suspicious: doneRows.filter(r => scoreLabel(r.score)==="Suspicious").length,
        high:       doneRows.filter(r => scoreLabel(r.score)==="High Risk").length,
        safe:       doneRows.filter(r => scoreLabel(r.score)==="Safe").length,
      } : null;

      const filteredRows = rows.filter(r => {
        if (filter === "All") return true;
        if (r.status !== "done") return false;
        return scoreLabel(r.score) === filter;
      });

      return (
        <div style={{ padding:"80px 40px 40px", maxWidth:1200, margin:"0 auto" }}>
          <div style={{ marginBottom:32 }}>
            <h1 className="bebas" style={{ fontSize:44, color:PALETTE.text, letterSpacing:".03em" }}>Bulk Image Scanner</h1>
            <p style={{ color:PALETTE.muted, fontSize:14, marginTop:4 }}>Upload multiple images — each one scanned with the real LSB extraction engine</p>
          </div>

          <div className="glass" style={{ borderRadius:12, padding:24, marginBottom:20 }}>
            <div style={{ display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
              <label className="btn-ghost" style={{ cursor:"pointer" }}>
                {files.length ? `${files.length} image${files.length>1?"s":""} selected ↺` : "Select Images"}
                <input ref={fileInputRef} type="file" accept="image/*" multiple style={{ display:"none" }} onChange={handleFiles} />
              </label>
              <button className="btn-primary" onClick={startScan} disabled={!files.length||scanning}>
                {scanning?"Scanning…":isDone?"Re-scan":"Start Bulk Analysis"}
              </button>
              {files.length > 0 && <button className="btn-ghost" style={{ fontSize:12, padding:"8px 16px" }} onClick={reset}>Clear</button>}
              {files.length === 0 && <span style={{ color:PALETTE.muted, fontSize:13 }}>Select at least one image to begin</span>}
            </div>

            {files.length > 0 && (scanning || isDone) && (
              <div style={{ marginTop:20 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                  <span className="mono" style={{ fontSize:12, color:PALETTE.muted }}>
                    {scanning ? `Analyzing: ${rows[currentIdx]?.name??"…"}` : `✓ All ${files.length} image${files.length>1?"s":""} analyzed`}
                  </span>
                  <span className="mono" style={{ fontSize:12, color:PALETTE.green }}>{doneRows.length}/{files.length} — {totalPct}%</span>
                </div>
                <div className="progress-bar" style={{ height:6 }}>
                  <div className="progress-fill" style={{ width:`${totalPct}%`, background:isDone?`linear-gradient(90deg,${PALETTE.green},${PALETTE.blue})`:`linear-gradient(90deg,${PALETTE.blue},${PALETTE.amber})` }} />
                </div>
              </div>
            )}
          </div>

          {summary && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:16, marginBottom:20 }}>
              {[
                { label:"Total Scanned", val:summary.total,      color:PALETTE.blue  },
                { label:"Safe",          val:summary.safe,        color:PALETTE.green },
                { label:"Suspicious",    val:summary.suspicious,  color:PALETTE.amber },
                { label:"High Risk",     val:summary.high,        color:PALETTE.red   },
              ].map((s,i) => (
                <div key={i} className="glass" style={{ borderRadius:12, padding:20, textAlign:"center", animation:`fadeUp .4s ${i*.07}s both`, opacity:0 }}>
                  <div style={{ fontSize:11, color:PALETTE.muted, marginBottom:8, textTransform:"uppercase", letterSpacing:".08em" }}>{s.label}</div>
                  <div className="mono bebas" style={{ fontSize:44, color:s.color, lineHeight:1 }}>{s.val}</div>
                </div>
              ))}
            </div>
          )}

          {rows.length > 0 ? (
            <div className="glass" style={{ borderRadius:12, overflow:"hidden" }}>
              <div style={{ padding:"14px 20px", borderBottom:`1px solid ${PALETTE.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
                <span style={{ fontSize:13, color:PALETTE.muted, textTransform:"uppercase", letterSpacing:".06em" }}>
                  {isDone ? `Scan Results — ${rows.length} image${rows.length>1?"s":""}` : "Scanning queue…"}
                </span>
                {isDone && (
                  <div style={{ display:"flex", gap:6 }}>
                    {["All","High Risk","Suspicious","Safe"].map(f => (
                      <span key={f} onClick={() => setFilter(f)} className="tag" style={{ cursor:"pointer", background:filter===f?`${PALETTE.blue}33`:`${PALETTE.blue}0D`, color:filter===f?PALETTE.blue:PALETTE.muted, transition:"all .15s" }}>{f}</span>
                    ))}
                  </div>
                )}
              </div>
              <table>
                <thead><tr><th>#</th><th>Image</th><th>Risk Score</th><th>Status</th><th>Payload</th></tr></thead>
                <tbody>
                  {filteredRows.map((r,i) => (
                    <tr key={r.name+i}>
                      <td><span className="mono" style={{ color:PALETTE.muted, fontSize:11 }}>{String(i+1).padStart(3,"0")}</span></td>
                      <td>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          {r.status==="scanning" && <div style={{ width:10, height:10, borderRadius:"50%", border:`2px solid ${PALETTE.blue}`, borderTopColor:"transparent", animation:"spin-slow .7s linear infinite", flexShrink:0 }} />}
                          <span className="mono" style={{ color:PALETTE.text, fontSize:12 }}>{r.name}</span>
                        </div>
                      </td>
                      <td>
                        {r.status==="done" ? (
                          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                            <div className="progress-bar" style={{ width:100 }}>
                              <div className="progress-fill" style={{ width:`${r.score}%`, background:scoreColor(r.score) }} />
                            </div>
                            <span className="mono" style={{ color:scoreColor(r.score), fontSize:12, minWidth:36 }}>{r.score}%</span>
                          </div>
                        ) : r.status==="scanning" ? (
                          <span className="mono" style={{ color:PALETTE.blue, fontSize:12, animation:"flicker 1.5s infinite" }}>analyzing…</span>
                        ) : (
                          <span style={{ color:PALETTE.muted, fontSize:12 }}>Queued</span>
                        )}
                      </td>
                      <td>
                        {r.status==="done" ? (
                          <span className="tag" style={{ background:`${scoreColor(r.score)}22`, color:scoreColor(r.score) }}>{scoreLabel(r.score)}</span>
                        ) : r.status==="scanning" ? (
                          <span className="tag" style={{ background:`${PALETTE.blue}18`, color:PALETTE.blue }}>Scanning</span>
                        ) : (
                          <span className="tag" style={{ background:`${PALETTE.muted}18`, color:PALETTE.muted }}>Queued</span>
                        )}
                      </td>
                      <td>
                        {r.status==="done" && r.lsb && (
                          <span className="mono" style={{ fontSize:11, color:r.lsb.isReadable?PALETTE.red:r.lsb.isEncrypted?PALETTE.amber:PALETTE.muted }}>
                            {r.lsb.isReadable?"⚠ plaintext":r.lsb.isEncrypted?"🔒 encrypted":"◎ none"}
                          </span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : (
            <div className="glass" style={{ borderRadius:12, padding:60, textAlign:"center" }}>
              <div style={{ fontSize:40, marginBottom:16, opacity:.3 }}>⬡</div>
              <div style={{ fontSize:14, color:PALETTE.muted, marginBottom:8 }}>No images loaded yet</div>
              <div style={{ fontSize:13, color:PALETTE.muted, opacity:.6 }}>Select one or more images above to begin bulk scanning</div>
            </div>
          )}
        </div>
      );
    }

    // ─── APP ROOT ─────────────────────────────────────────────────────────────────
    // scanHistory is the single source of truth for the Dashboard.
    // Every completed scan from Scanner or BulkScanner appends to it.
    function App() {
      const [page, setPage]           = useState("landing");
      const [scanHistory, setScanHistory] = useState([]);

      // Called by Scanner (single) and BulkScanner (per file) on each completion
      const handleScanComplete = useCallback(entry => {
        setScanHistory(prev => [...prev, entry]);
      }, []);

      const pages = { landing:Landing, dashboard:Dashboard, scanner:Scanner, bulk:BulkScanner };
      const Page  = pages[page];

      return (
        <>
          <GlobalStyle />
          <div style={{ minHeight:"100vh", background:PALETTE.bg }}>
            <Nav page={page} setPage={setPage} />
            <Page
              setPage={setPage}
              scanHistory={scanHistory}
              onScanComplete={handleScanComplete}
            />
          </div>
        </>
      );
    }

    // ─── MOUNT ────────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
    document.getElementById("root").classList.add("ready");
  </script>
</body>
</html>
